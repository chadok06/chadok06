<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySpace - Minimalist Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="flex h-screen bg-slate-50">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col">
        <div class="p-6">
            <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <i data-lucide="book-open" class="text-blue-600"></i> StudySpace
            </h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-xl font-medium">
                <i data-lucide="calendar"></i> Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-medium transition-colors">
                <i data-lucide="file-text"></i> Learning Hub
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-medium transition-colors">
                <i data-lucide="clock"></i> Active Session
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Today's Schedule</h2>
                <p class="text-slate-500 mt-1">จัดการเวลาเรียนของคุณอย่างมีประสิทธิภาพ</p>
            </div>
            <div class="flex gap-3">
                <button class="px-4 py-2 bg-white border border-slate-200 text-slate-700 rounded-lg font-medium hover:bg-slate-50 flex items-center gap-2 shadow-sm">
                    <i data-lucide="plus" class="w-5 h-5"></i> Add Task
                </button>
                <button onclick="openModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 flex items-center gap-2 shadow-sm transition-colors">
                    <i data-lucide="wand-2" class="w-5 h-5"></i> AI Planner
                </button>
            </div>
        </header>

        <div class="max-w-3xl">
            <h3 class="text-lg font-semibold text-slate-700 mb-4">Active Tasks</h3>
            <div id="task-list-container" class="space-y-3">
                </div>
        </div>
    </main>

    <div id="ai-modal" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-2xl shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="wand-2" class="text-blue-500"></i> AI Long-term Planner
                </h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <div id="modal-input-section" class="space-y-4">
                <label class="block text-sm font-medium text-slate-600">เป้าหมายการเรียนของคุณคืออะไร?</label>
                <textarea id="ai-prompt" class="w-full p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-200 focus:border-blue-400 outline-none" rows="4" placeholder="เช่น สอนแคลคูลัส 1 ตั้งแต่เริ่มจนสอบใน 14 วัน โดยเน้นทำโจทย์..."></textarea>
                <button id="generate-btn" onclick="generateAiPlan()" class="w-full py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 flex justify-center items-center gap-2 transition-colors">
                    Generate Study Plan
                </button>
            </div>

            <div id="modal-draft-section" class="hidden space-y-4 mt-4">
                <h3 class="font-semibold text-slate-700">Draft Schedule (รอยืนยัน)</h3>
                <div id="draft-list" class="max-h-60 overflow-y-auto space-y-2 pr-2">
                    </div>
                <div class="flex gap-3 pt-4 border-t border-slate-100">
                    <button onclick="resetModal()" class="flex-1 py-2 bg-slate-100 text-slate-600 rounded-lg font-medium hover:bg-slate-200">
                        ปรับแก้ (Edit)
                    </button>
                    <button onclick="confirmAiPlan()" class="flex-1 py-2 bg-green-600 text-white rounded-lg font-medium hover:bg-green-700">
                        ยืนยันลงปฏิทิน (Confirm)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. State Management ---
        let tasks = [
            { id: 'task-1', title: 'อ่านหนังสือชีววิทยา บทที่ 1', day: 1, duration: 45, remaining: 45 * 60, status: 'Todo', intervalId: null }
        ];
        let draftPlan = [];

        // ฟังก์ชันแปลงวินาทีเป็นรูปแบบ MM:SS
        const formatTime = (seconds) => {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        };

        // --- 2. Rendering Functions ---
        function renderTasks() {
            const container = document.getElementById('task-list-container');
            container.innerHTML = '';

            if (tasks.length === 0) {
                container.innerHTML = '<div class="text-center py-10 text-slate-400 bg-white rounded-xl border border-dashed border-slate-300">ยังไม่มีแผนการเรียน กดปุ่ม AI Planner เพื่อสร้างได้เลย!</div>';
                return;
            }

            tasks.forEach(task => {
                const isDone = task.status === 'Done';
                const el = document.createElement('div');
                el.className = `p-4 rounded-xl shadow-sm border mb-3 transition-all ${isDone ? 'bg-green-50 border-green-200' : 'bg-white border-slate-200'}`;
                
                let innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="font-bold ${isDone ? 'text-green-700 line-through' : 'text-slate-700'}">${task.title}</h3>
                            <div class="flex items-center gap-2 mt-1">
                                <i data-lucide="clock" class="w-3.5 h-3.5 text-slate-400"></i>
                                <span class="text-sm text-slate-500">Day ${task.day} • ${task.duration} mins</span>
                            </div>
                        </div>
                `;

                if (!isDone) {
                    innerHTML += `
                        <div class="flex items-center gap-4">
                            <p id="timer-display-${task.id}" class="text-2xl font-mono text-blue-600 font-semibold">${formatTime(task.remaining)}</p>
                            <div class="flex gap-2">
                                <button onclick="toggleTimer('${task.id}')" id="btn-play-${task.id}" class="p-2 bg-blue-100 text-blue-600 rounded-full hover:bg-blue-200 transition-colors">
                                    <i data-lucide="${task.intervalId ? 'pause' : 'play'}" class="w-5 h-5"></i>
                                </button>
                                <button onclick="resetTimer('${task.id}')" class="p-2 bg-slate-100 text-slate-400 rounded-full hover:bg-slate-200">
                                    <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                                </button>
                                <button onclick="completeTask('${task.id}')" class="p-2 bg-green-100 text-green-600 rounded-full hover:bg-green-200">
                                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    innerHTML += `<div class="text-green-600 font-bold flex items-center gap-2"><i data-lucide="check-circle"></i> Completed</div>`;
                }

                innerHTML += `</div>`;
                el.innerHTML = innerHTML;
                container.appendChild(el);
            });

            // อัปเดตไอคอนของ Lucide ให้แสดงผลใหม่หลัง Render
            lucide.createIcons();
        }

        // --- 3. Timer Logic ---
        function toggleTimer(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            if (task.intervalId) {
                // หยุดเวลา (Pause)
                clearInterval(task.intervalId);
                task.intervalId = null;
            } else {
                // เริ่มเวลา (Play)
                task.intervalId = setInterval(() => {
                    task.remaining--;
                    document.getElementById(`timer-display-${id}`).innerText = formatTime(task.remaining);
                    
                    if (task.remaining <= 0) {
                        clearInterval(task.intervalId);
                        task.intervalId = null;
                        alert(`🎉 จบช่วงเวลาเรียน: ${task.title} แล้ว!`);
                        completeTask(id);
                    }
                }, 1000);
            }
            renderTasks(); // Render ใหม่เพื่อเปลี่ยนไอคอน Play/Pause
        }

        function resetTimer(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                if (task.intervalId) clearInterval(task.intervalId);
                task.intervalId = null;
                task.remaining = task.duration * 60;
                renderTasks();
            }
        }

        function completeTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                if (task.intervalId) clearInterval(task.intervalId);
                task.status = 'Done';
                renderTasks();
            }
        }

        // --- 4. AI Modal Logic ---
        const modal = document.getElementById('ai-modal');
        const inputSection = document.getElementById('modal-input-section');
        const draftSection = document.getElementById('modal-draft-section');
        const generateBtn = document.getElementById('generate-btn');

        function openModal() {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            resetModal();
        }

        function resetModal() {
            document.getElementById('ai-prompt').value = '';
            inputSection.classList.remove('hidden');
            draftSection.classList.add('hidden');
            generateBtn.innerText = 'Generate Study Plan';
            generateBtn.disabled = false;
        }

        function generateAiPlan() {
            const prompt = document.getElementById('ai-prompt').value;
            if (!prompt) return alert('กรุณาระบุเป้าหมายการเรียนครับ');

            generateBtn.innerText = 'กำลังวิเคราะห์แผนการเรียน...';
            generateBtn.disabled = true;

            // จำลองการดึง API (Mockup Data)
            setTimeout(() => {
                draftPlan = [
                    { id: 'ai-1', title: 'ปูพื้นฐานแคลคูลัส (ลิมิต)', day: 1, duration: 60, remaining: 60 * 60, status: 'Todo', intervalId: null },
                    { id: 'ai-2', title: 'ฝึกทำโจทย์ลิมิต 20 ข้อ', day: 2, duration: 90, remaining: 90 * 60, status: 'Todo', intervalId: null }
                ];

                const draftList = document.getElementById('draft-list');
                draftList.innerHTML = draftPlan.map(task => `
                    <div class="p-3 bg-slate-50 border border-slate-200 rounded-lg flex justify-between items-center">
                        <div>
                            <span class="text-xs font-bold text-blue-600 bg-blue-100 px-2 py-1 rounded-full mr-2">Day ${task.day}</span>
                            <span class="text-slate-700">${task.title}</span>
                        </div>
                        <span class="text-sm text-slate-500">${task.duration} นาที</span>
                    </div>
                `).join('');

                inputSection.classList.add('hidden');
                draftSection.classList.remove('hidden');
            }, 1500);
        }

        function confirmAiPlan() {
            tasks = [...tasks, ...draftPlan];
            closeModal();
            renderTasks();
        }

        // โหลดข้อมูลเริ่มต้นเมื่อเปิดหน้าเว็บ
        renderTasks();

    </script>
</body>
</html>
