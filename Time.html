<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>\u0e41\u0e1c\u0e19\u0e01\u0e32\u0e23\u0e40\u0e23\u0e35\u0e22\u0e19 \u00b7 \u0e2a\u0e2d\u0e1a\u0e40\u0e02\u0e49\u0e32\u0e21\u0e2b\u0e34\u0e14\u0e25</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --deep: #0d1f3c;
    --blue: #1a3a6b;
    --gold: #c9a227;
    --gold-light: #e8c45a;
    --cream: #f5efe0;
    --white: #ffffff;
    --text: #e8dfc8;
    --muted: #8a9bb5;
    --success: #4caf89;
    --danger: #e05c5c;
    --card-bg: rgba(255,255,255,0.04);
    --border: rgba(201,162,39,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(26,58,107,0.5) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(201,162,39,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  /* ===== HEADER ===== */
  header {
    padding: 40px 20px 0;
    text-align: center;
    position: relative;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(201,162,39,0.12);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 6px 18px;
    font-size: 13px;
    color: var(--gold-light);
    letter-spacing: 1px;
    margin-bottom: 20px;
    animation: fadeDown 0.6s ease both;
  }

  .logo-badge svg { width: 14px; height: 14px; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--white);
    line-height: 1.15;
    animation: fadeDown 0.7s 0.1s ease both;
  }

  h1 em {
    font-style: italic;
    color: var(--gold-light);
  }

  .subtitle {
    margin-top: 10px;
    color: var(--muted);
    font-size: 15px;
    animation: fadeDown 0.7s 0.2s ease both;
  }

  /* ===== COUNTDOWN ===== */
  .countdown-section {
    margin: 36px auto 0;
    max-width: 560px;
    animation: fadeDown 0.7s 0.3s ease both;
  }

  .countdown-label {
    text-align: center;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .countdown-boxes {
    display: flex;
    justify-content: center;
    gap: 12px;
  }

  .cd-box {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    text-align: center;
    min-width: 80px;
    backdrop-filter: blur(10px);
