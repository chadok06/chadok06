<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Master 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#FDFDFD]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Mock Lucide Icons (เนื่องจากใน HTML ต้องเรียกใช้ต่างจาก React เล็กน้อย)
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- Data & Config ---
        const fullVocabData = [
            { id: 1, words: ["woe", "agony", "misery", "groom", "grief", "sorrow", "distress", "affliction"], meaning: "ความเศร้า ความทุกข์" },
            { id: 2, words: ["economical", "frugal", "thrifty", "saving", "tight-fisted"], meaning: "ประหยัด" },
            { id: 3, words: ["miserly", "stingy", "tight", "penny-pinching"], meaning: "ขี้เหนียว" },
            { id: 4, words: ["jeopardize", "threaten", "menace"], meaning: "ทำอันตราย" },
            { id: 5, words: ["spread", "scatter", "pervade", "disperse", "proliferate"], meaning: "แพร่กระจาย" },
            { id: 6, words: ["deal with", "cope with", "handle", "tackle"], meaning: "รับมือ จัดการ" },
            { id: 7, words: ["adequate", "enough", "sufficient"], meaning: "เพียงพอ" },
            { id: 8, words: ["force", "coerce", "compel", "oblige", "mandate"], meaning: "บังคับ" },
            { id: 9, words: ["compulsory", "obligatory", "mandatory"], meaning: "ที่บังคับ" },
            { id: 10, words: ["abide by", "comply with", "conform to", "obey"], meaning: "เชื่อฟัง ทำตาม" },
            { id: 11, words: ["foremost", "optimum", "optimal"], meaning: "ดีที่สุด" },
            { id: 12, words: ["set off", "set out", "embark on"], meaning: "เริ่มต้นออกเดินทาง" },
            { id: 13, words: ["innate", "inborn", "inbred", "congenital", "inherent"], meaning: "โดยกำเนิด" },
            { id: 14, words: ["remove", "get rid of", "eliminate", "disgard"], meaning: "กำจัด" },
            { id: 15, words: ["decay", "decline", "degenerate", "deteriorate"], meaning: "เสื่อมโทรม" },
            { id: 16, words: ["raise", "rear", "bring up", "nurture"], meaning: "เลี้ยงดู" },
            { id: 17, words: ["soar", "surge", "skyrocket", "shoot up"], meaning: "พุ่งทะยาน" },
            { id: 18, words: ["recede", "recoil", "retreat"], meaning: "ถดถอย" },
            { id: 19, words: ["motivate", "activate", "rouse", "arouse"], meaning: "กระตุ้น" },
            { id: 20, words: ["deflect", "divert", "deviate", "distract"], meaning: "เบี่ยงเบน" },
            { id: 21, words: ["coax", "cajole", "sway", "convince", "persuade"], meaning: "โน้มน้าว" },
            { id: 22, words: ["bar", "block", "obstruct", "impede", "hinder", "thwart"], meaning: "ขัดขวาง" },
            { id: 23, words: ["strange", "weird", "peculiar", "odd", "eccentric", "bizarre"], meaning: "แปลก ประหลาด" },
            { id: 24, words: ["look down on", "scorn", "contempt", "disdain", "insult"], meaning: "ดูถูก" },
            { id: 25, words: ["fatigue", "exhausted", "run down", "worn out", "weary"], meaning: "เหนื่อย" },
            { id: 26, words: ["firm", "company", "corporation", "enterprise"], meaning: "บริษัท" },
            { id: 27, words: ["essential", "crucial", "vital", "pivotal", "critical"], meaning: "สำคัญ" },
            { id: 28, words: ["announce", "proclaim", "declare"], meaning: "ประกาศ" },
            { id: 29, words: ["trivial", "trifling", "petty", "miscellaneous"], meaning: "เล็กน้อย ไม่สำคัญ" },
            { id: 30, words: ["erode", "corrode", "wear away", "eat away"], meaning: "กัดกร่อน" }
        ];

        const START_DATE = new Date('2026-05-05');
        START_DATE.setHours(0, 0, 0, 0);

        function App() {
            const [username, setUsername] = useState(localStorage.getItem('vocab_user_v2') || "");
            const [loginInput, setLoginInput] = useState("");
            const [userProgress, setUserProgress] = useState(JSON.parse(localStorage.getItem('progress_' + username) || "{}"));
            const [quizHistory, setQuizHistory] = useState(JSON.parse(localStorage.getItem('quiz_stats_' + username) || "null"));
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [view, setView] = useState('calendar');
            const [quizState, setQuizState] = useState({ questions: [], currentIdx: 0, score: 0, showResult: false, answered: null, title: "DAILY QUIZ", mistakes: [] });

            // --- Save Data Helper (Local Storage for HTML version) ---
            useEffect(() => {
                if (username) {
                    localStorage.setItem('progress_' + username, JSON.stringify(userProgress));
                    localStorage.setItem('quiz_stats_' + username, JSON.stringify(quizHistory));
                }
            }, [userProgress, quizHistory, username]);

            const getGroupsForDate = (date) => {
                const d = new Date(date); d.setHours(0,0,0,0);
                const diff = Math.floor((d.getTime() - START_DATE.getTime()) / (1000 * 60 * 60 * 24));
                if (diff >= 0) {
                    const startIdx = (diff * 3) % fullVocabData.length;
                    return [fullVocabData[startIdx], fullVocabData[(startIdx + 1) % fullVocabData.length], fullVocabData[(startIdx + 2) % fullVocabData.length]];
                }
                return [];
            };

            const currentGroups = useMemo(() => getGroupsForDate(selectedDate), [selectedDate]);

            const markAsLearned = () => {
                const dateKey = selectedDate.toISOString().split('T')[0];
                setUserProgress(prev => ({ ...prev, [dateKey]: true }));
            };

            const startDailyQuiz = () => {
                let qs = [];
                currentGroups.forEach(g => {
                    g.words.slice(0, 2).forEach(w => {
                        const others = fullVocabData.filter(v => v.id !== g.id).map(v => v.meaning).sort(() => Math.random() - 0.5).slice(0, 3);
                        qs.push({ word: w, answer: g.meaning, options: [...others, g.meaning].sort(() => Math.random() - 0.5) });
                    });
                });
                setQuizState({ questions: qs.sort(() => Math.random() - 0.5), currentIdx: 0, score: 0, showResult: false, answered: null, title: "DAILY QUIZ", mistakes: [] });
                setView('quiz');
            };

            const renderCalendar = () => {
                const year = selectedDate.getFullYear();
                const month = selectedDate.getMonth();
                const days = new Date(year, month + 1, 0).getDate();
                const learnedCount = Object.keys(userProgress).length;
                
                return (
                    <div className="max-w-md mx-auto space-y-4 pb-20 animate-in">
                        <div className="bg-white rounded-[2.5rem] shadow-xl p-8 border border-slate-100">
                            <h2 className="text-xl font-black text-slate-800 text-center mb-8 uppercase">
                                {new Intl.DateTimeFormat('th-TH', { month: 'long', year: 'numeric' }).format(selectedDate)}
                            </h2>
                            <div className="grid grid-cols-7 gap-2">
                                {['S','M','T','W','T','F','S'].map(d => <div key={d} className="text-center text-[10px] font-black text-slate-300">{d}</div>)}
                                {Array.from({ length: days }, (_, i) => i + 1).map(day => {
                                    const d = new Date(year, month, day);
                                    const key = d.toISOString().split('T')[0];
                                    const isSelected = selectedDate.getDate() === day;
                                    return (
                                        <button key={day} onClick={() => { setSelectedDate(d); setView('study'); }} 
                                            class={`h-12 rounded-2xl font-black text-sm relative flex flex-col items-center justify-center transition-all ${isSelected ? 'bg-indigo-600 text-white scale-110 shadow-lg' : 'text-slate-700 hover:bg-indigo-50'}`}>
                                            {day}
                                            {userProgress[key] && <div class={`w-1.5 h-1.5 rounded-full mt-1 ${isSelected ? 'bg-white' : 'bg-green-500'}`}></div>}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        <div className="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100">
                            <h3 className="font-black text-slate-800 text-lg mb-4">สถิติ 10 วันล่าสุด</h3>
                            {quizHistory ? (
                                <div className="bg-slate-50 p-5 rounded-3xl border border-slate-100">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase">ช่วงวันที่: {quizHistory.dateRange}</p>
                                    <div className="flex justify-between items-center mt-2">
                                        <span className="text-sm font-black text-slate-700">คะแนนสอบ</span>
                                        <span className="text-2xl font-black text-indigo-600">{quizHistory.score}/20</span>
                                    </div>
                                </div>
                            ) : <p className="text-xs text-slate-400 italic">สะสมให้ครบ 10 วันเพื่อสอบใหญ่</p>}
                        </div>
                    </div>
                );
            };

            const renderStudy = () => (
                <div className="max-w-md mx-auto space-y-4 pb-20 animate-in">
                    <button onClick={() => setView('calendar')} className="bg-white p-4 rounded-2xl font-black text-indigo-600 flex items-center gap-2"><Icon name="chevron-left" /> BACK</button>
                    {currentGroups.map((g, i) => (
                        <div key={i} onClick={markAsLearned} className="bg-white p-8 rounded-[2.5rem] shadow-sm border-2 border-transparent hover:border-indigo-100 cursor-pointer">
                            <div className="flex justify-between mb-4">
                                <span className="text-indigo-600 font-black text-2xl">{g.meaning}</span>
                                {userProgress[selectedDate.toISOString().split('T')[0]] && <Icon name="check-circle-2" className="text-green-500" />}
                            </div>
                            <div className="flex flex-wrap gap-2">
                                {g.words.map(w => <span key={w} className="bg-slate-50 text-slate-600 px-4 py-2 rounded-xl text-xs font-black">{w}</span>)}
                            </div>
                        </div>
                    ))}
                    <button onClick={startDailyQuiz} className="w-full bg-indigo-600 text-white py-6 rounded-[2rem] font-black shadow-xl">START DAILY QUIZ</button>
                </div>
            );

            const renderQuiz = () => {
                const q = quizState.questions[quizState.currentIdx];
                if (quizState.showResult) {
                    return (
                        <div className="max-w-md mx-auto bg-white p-12 rounded-[3.5rem] shadow-2xl text-center space-y-6 animate-in">
                            <Icon name="trophy" size={64} className="mx-auto text-amber-500" />
                            <h2 className="text-3xl font-black text-slate-800">DONE!</h2>
                            <p className="text-6xl font-black text-indigo-600">{quizState.score}/{quizState.questions.length}</p>
                            <button onClick={() => setView('calendar')} className="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black">BACK HOME</button>
                        </div>
                    );
                }
                return (
                    <div className="max-w-md mx-auto space-y-6 animate-in">
                        <div className="bg-white p-12 rounded-[3.5rem] shadow-xl text-center space-y-8">
                            <h2 className="text-4xl font-black text-slate-800">{q?.word}</h2>
                            <div className="grid gap-3">
                                {q?.options.map(opt => (
                                    <button key={opt} onClick={() => {
                                        const isCorrect = opt === q.answer;
                                        setQuizState(prev => ({ ...prev, answered: opt }));
                                        setTimeout(() => {
                                            if (quizState.currentIdx + 1 < quizState.questions.length) {
                                                setQuizState(prev => ({ ...prev, currentIdx: prev.currentIdx + 1, score: isCorrect ? prev.score + 1 : prev.score, answered: null }));
                                            } else {
                                                setQuizState(prev => ({ ...prev, score: isCorrect ? prev.score + 1 : prev.score, showResult: true }));
                                            }
                                        }, 600);
                                    }} className={`py-5 rounded-2xl font-black border-2 transition-all ${quizState.answered === opt ? (opt === q.answer ? 'bg-green-500 text-white' : 'bg-red-500 text-white') : 'bg-slate-50 border-transparent'}`}>
                                        {opt}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            if (!username) {
                return (
                    <div className="min-h-screen bg-indigo-600 flex items-center justify-center p-6">
                        <div className="bg-white w-full max-w-sm rounded-[3rem] p-12 shadow-2xl text-center space-y-8">
                            <h1 className="text-2xl font-black text-slate-800 uppercase">Vocab Master</h1>
                            <input type="text" value={loginInput} onChange={e => setLoginInput(e.target.value)} placeholder="Username" className="w-full p-5 bg-slate-50 rounded-2xl font-black outline-none border-2 focus:border-indigo-500" />
                            <button onClick={() => { setUsername(loginInput); localStorage.setItem('vocab_user_v2', loginInput); }} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg">LOG IN</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-4 max-w-md mx-auto min-h-screen">
                    <header className="flex justify-between items-center py-6">
                        <span className="font-black text-slate-800">VOCAB MASTER</span>
                        <div className="flex items-center gap-2">
                            <span className="text-[10px] font-black text-slate-400 uppercase">{username}</span>
                            <button onClick={() => { setUsername(""); localStorage.removeItem('vocab_user_v2'); }}><Icon name="log-out" size={18} className="text-slate-300" /></button>
                        </div>
                    </header>
                    {view === 'calendar' ? renderCalendar() : view === 'study' ? renderStudy() : renderQuiz()}
                    <nav className="fixed bottom-6 left-0 right-0 flex justify-center">
                        <div className="bg-white shadow-2xl rounded-full p-2 flex gap-2 border border-slate-100">
                            <button onClick={() => setView('calendar')} className={`p-4 rounded-full ${view === 'calendar' ? 'bg-indigo-600 text-white' : 'text-slate-300'}`}><Icon name="calendar" /></button>
                            <button onClick={() => setView('study')} className={`p-4 rounded-full ${view === 'study' ? 'bg-indigo-600 text-white' : 'text-slate-300'}`}><Icon name="book-open" /></button>
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
